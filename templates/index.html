<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Födelsedag</title>
</head>
<body>
    <h1>Födelsedagsräknare</h1>

    <form action="/resultat" method="POST">
        <label>Namn:</label>
        <input type="text" name="namn" required>
        <br><br>

        <label>Födelsedatum:</label>
        <input type="date" name="fodelsedatum" required>
        <br><br>

        <button type="submit">Skicka</button>
    </form>
</body>
</html>
